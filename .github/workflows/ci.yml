name: CI

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore MovieCatalog.sln

      - name: Build solution
        run: dotnet build MovieCatalog.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test MovieCatalog.sln --configuration Release --no-build
